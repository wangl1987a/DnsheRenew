name: Monthly DNSHE Renew

on:
  schedule:
    - cron: "15 0 1 * *"
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Renew
        env:
          DNSHE_API_KEYS: ${{ secrets.DNSHE_API_KEYS }}
          DNSHE_API_SECRETS: ${{ secrets.DNSHE_API_SECRETS }}
          DNSHE_API_BASE_URL: ${{ vars.DNSHE_API_BASE_URL }}
          DNSHE_NOTIFY_TELEGRAM_BOT_TOKEN: ${{ secrets.DNSHE_NOTIFY_TELEGRAM_BOT_TOKEN }}
          DNSHE_NOTIFY_TELEGRAM_CHAT_ID: ${{ secrets.DNSHE_NOTIFY_TELEGRAM_CHAT_ID }}
          DNSHE_NOTIFY_TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.DNSHE_NOTIFY_TELEGRAM_MESSAGE_THREAD_ID }}
          DNSHE_NOTIFY_WEBHOOK_URL: ${{ secrets.DNSHE_NOTIFY_WEBHOOK_URL }}
          DNSHE_NOTIFY_WEBHOOK_TOKEN: ${{ secrets.DNSHE_NOTIFY_WEBHOOK_TOKEN }}
        run: go run ./cmd/dnsherene
